name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      # bun.lock predates the package rename and the comment-json dependency.
      # Refresh it in the disposable release runner instead of blocking publish.
      - run: bun install
      - run: bun test
      - run: bun run build
      - run: npm publish --access public
